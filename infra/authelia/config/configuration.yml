server:
    address: "tcp://:9091"

theme: "dark"

log:
    level: "debug"
    format: json
    file_path: "/var/log/authelia/authelia.log"
    keep_stdout: true

totp: # Time-based One-Time Password
    issuer: '{{ env "DOMAIN" }}' # Might need to be authelia.com
    period: 30 # 30 seconds
    digits: 6
    algorithm: "sha1"
    skew: 1

authentication_backend:
    file:
        path: "/config/users_database.yml"
        password:
            algorithm: "argon2id"
            iterations: 3
            key_length: 32
            salt_length: 16
            parallelism: 4
            memory: 256

password_policy:
    # The standard policy allows you to tune individual settings manually.
    standard:
        enabled: false # TODO: Choose ONE policy to enable, not both.
        min_length: 8
        max_length: 0
        require_uppercase: true
        require_lowercase: true
        require_number: true
        require_special: true
    # zxcvbn is a well known and used password strength algorithm. It does not have tunable settings.
    zxcvbn:
        enabled: true # TODO: Choose ONE policy to enable, not both.
        min_score: 3

access_control:
    default_policy: "deny"
    rules:
        # bypass rule
        - domain:
              - 'auth.{{ env "DOMAIN" }}'
          policy: "bypass"
        # two factor login - catch all
        - domain:
              - '{{ env "DOMAIN" }}'
              - '*.{{ env "DOMAIN" }}'
          policy: "two_factor"

session:
    name: "authelia_session"
    expiration: "1h"
    inactivity: "5m"
    remember_me: "1M"
    cookies:
        - domain: '{{ env "DOMAIN" }}'
          authelia_url: 'https://auth.{{ env "DOMAIN" }}'
          same_site: "lax"

regulation:
    max_retries: 3
    find_time: "2m"
    ban_time: "30m"

storage:
    local:
        path: "/config/db.sqlite3"

notifier:
    smtp:
        address: 'smtp://{{ env "EMAIL_SERVER" }}:{{ env "EMAIL_SERVER_PORT" }}'
        username: '{{ env "EMAIL_SERVER_USER" }}'
        password: '{{ env "EMAIL_SERVER_PASSWORD" }}'
        sender: 'Authelia <{{ env "EMAIL_FROM" }}>'
        identifier: '{{ env "DOMAIN" }}'
        subject: "[Authelia] {title}"

identity_providers:
  oidc:
    jwks:
      - key: {{ secret "/config/secrets/oidc/jwks/rsa.2048.key" | mindent 10 "|" | msquote }}
    hmac_secret: '{{ env "AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET" }}'
    clients:
        - client_id: '{{ env "IMMICH_CLIENT_ID" }}' # Random 100-character alphanumeric string. See: https://www.authelia.com/configuration/identity-providers/openid-connect/clients/#client_id
          client_name: "immich"
          client_secret: '{{ env "IMMICH_CLIENT_SECRET_HASHED" }}' # Hashed client secret. See: https://www.authelia.com/integration/openid-connect/frequently-asked-questions/#how-do-i-generate-a-client-identifier-or-client-secret
          public: false
          authorization_policy: "two_factor"
          require_pkce: false
          pkce_challenge_method: ""
          redirect_uris:
              - 'https://{{ env "IMMICH_DOMAIN" }}/auth/login'
              - 'https://{{ env "IMMICH_DOMAIN" }}/user-settings'
              - "app.immich:///oauth-callback"
          scopes:
              - "openid"
              - "profile"
              - "email"
          response_types:
              - "code"
          grant_types:
              - "authorization_code"
          access_token_signed_response_alg: "RS256"
          userinfo_signed_response_alg: "RS256"
          token_endpoint_auth_method: "client_secret_post"
          