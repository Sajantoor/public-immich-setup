services:
    # Docker Socket Proxy - Security Enchanced Proxy for Docker Socket
    socket-proxy:
        container_name: socket-proxy
        image: lscr.io/linuxserver/socket-proxy:latest
        restart: unless-stopped
        ports:
            - "2375:2375"
        environment:
            ## Granted by Default
            - EVENTS=1
            - PING=1
            - VERSION=1
            ## Revoked by Default
            # Security critical
            - AUTH=0
            - SECRETS=0
            # Not always needed
            - BUILD=0
            - COMMIT=0
            - CONFIGS=0
            - CONTAINERS=1 # Traefik, Glance
            - DISTRIBUTION=0
            - EXEC=0
            - NODES=0
            - PLUGINS=0
            - SESSION=0
            - SWARM=0
            - SYSTEM=0
        volumes:
            - "/var/run/docker.sock:/var/run/docker.sock:ro"
        networks:
            socket-proxy:
        read_only: true
        tmpfs:
            - /run
        security_opt:
            - no-new-privileges:true
